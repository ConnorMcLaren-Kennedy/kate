<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#FF69B4">
<title>Archive - Connor's Show and Tell</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* ================================================================
   CUSTOM PROPERTIES
   ================================================================ */
:root {
  --barbie-hot: #FF69B4;
  --barbie-deep: #FF1493;
  --barbie-fuchsia: #FF00FF;
  --barbie-blush: #FFB6C1;
  --barbie-pastel: #FFC0CB;
  --barbie-lavender: #FFF0F5;
  --barbie-gold: #FFD700;
  --barbie-lilac: #DDA0DD;
  --barbie-magenta: #C71585;
  --barbie-cream: #FFE4E1;
  --glow-pink: rgba(255, 105, 180, 0.4);
  --glow-fuchsia: rgba(255, 0, 255, 0.15);
}

/* ================================================================
   RESET & BASE
   ================================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

::selection {
  background: var(--barbie-deep);
  color: #fff;
}

::-webkit-scrollbar { width: 10px; }
::-webkit-scrollbar-track { background: var(--barbie-cream); }
::-webkit-scrollbar-thumb { background: var(--barbie-hot); border-radius: 99px; }
::-webkit-scrollbar-thumb:hover { background: var(--barbie-deep); }

html { scroll-behavior: smooth; }

body {
  font-family: 'Quicksand', 'Comic Sans MS', cursive, sans-serif;
  background: linear-gradient(-45deg, #FFB6C1, #FF69B4, #FF1493, #DDA0DD, #FFB6C1, #FF69B4);
  background-size: 400% 400%;
  animation: gradient-shift 12s ease infinite;
  min-height: 100vh;
  overflow-x: hidden;
  color: var(--barbie-magenta);
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 25% 15%, rgba(255,255,255,0.2) 0%, transparent 50%),
    radial-gradient(ellipse at 75% 85%, rgba(255,0,255,0.08) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

/* ================================================================
   HEADER
   ================================================================ */
header {
  position: relative;
  z-index: 5;
  text-align: center;
  padding: 3rem 1rem 1rem;
}

.site-title {
  font-family: 'Pacifico', 'Comic Sans MS', cursive;
  font-size: clamp(2.2rem, 8vw, 4.5rem);
  line-height: 1.2;
  background: linear-gradient(
    90deg,
    var(--barbie-hot),
    var(--barbie-deep),
    var(--barbie-gold),
    var(--barbie-fuchsia),
    var(--barbie-hot),
    var(--barbie-deep)
  );
  background-size: 200% auto;
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: shimmer 3s linear infinite;
  filter: drop-shadow(0 4px 15px rgba(255,20,147,0.5))
          drop-shadow(0 0 40px rgba(255,0,255,0.2));
  padding: 0.2em 0;
  word-break: break-word;
}

/* ================================================================
   BACK LINK
   ================================================================ */
.back-link-section {
  position: relative;
  z-index: 5;
  max-width: 1200px;
  margin: 0 auto;
  padding: 1rem 1rem 0;
  text-align: center;
}

.back-link {
  display: inline-block;
  font-family: 'Pacifico', 'Comic Sans MS', cursive;
  font-size: clamp(1.3rem, 4vw, 2rem);
  color: #fff;
  background: linear-gradient(135deg, var(--barbie-hot), var(--barbie-deep));
  padding: 0.75rem 2.5rem;
  border-radius: 50px;
  text-decoration: none;
  box-shadow: 0 4px 20px var(--glow-pink);
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.back-link:hover {
  transform: scale(1.05);
  box-shadow: 0 6px 30px var(--glow-pink);
}

/* ================================================================
   GALLERY CONTAINER
   ================================================================ */
.gallery {
  position: relative;
  z-index: 5;
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 1rem 3rem;
}

/* ================================================================
   CATEGORY SECTIONS
   ================================================================ */
.category-section {
  margin-bottom: 0.5rem;
}

.category-title {
  font-family: 'Pacifico', 'Comic Sans MS', cursive;
  font-size: clamp(1.5rem, 5vw, 2.6rem);
  text-align: center;
  padding: 2.5rem 1rem 0.5rem;
  background: linear-gradient(
    90deg,
    var(--barbie-hot),
    var(--barbie-fuchsia),
    var(--barbie-gold),
    var(--barbie-deep),
    var(--barbie-hot)
  );
  background-size: 200% auto;
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: shimmer 3.5s linear infinite;
  filter: drop-shadow(0 2px 10px rgba(255,20,147,0.35));
  position: relative;
}

.category-title::after {
  content: '';
  display: block;
  width: 100px;
  height: 3px;
  background: linear-gradient(90deg, transparent, var(--barbie-hot), var(--barbie-fuchsia), var(--barbie-hot), transparent);
  margin: 0.6rem auto 0;
  border-radius: 2px;
}

.category-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 1.5rem;
  padding: 1rem 0;
}

@media (min-width: 600px) {
  .category-grid { grid-template-columns: repeat(2, 1fr); gap: 1.75rem; }
}

@media (min-width: 1024px) {
  .category-grid { grid-template-columns: repeat(3, 1fr); gap: 2rem; }
}

/* ================================================================
   CARDS
   ================================================================ */
.barbie-card {
  background: linear-gradient(145deg, var(--barbie-lavender) 0%, var(--barbie-cream) 50%, var(--barbie-lavender) 100%);
  border: 3px solid var(--barbie-hot);
  border-radius: 20px;
  overflow: hidden;
  box-shadow:
    0 6px 25px var(--glow-pink),
    0 0 50px var(--glow-fuchsia);
  opacity: 0;
  transform: translateY(45px) scale(0.94);
  transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s ease;
}

.barbie-card.visible {
  opacity: 1;
  transform: translateY(0) scale(1);
}

.barbie-card:hover {
  box-shadow:
    0 10px 40px rgba(255,105,180,0.5),
    0 0 70px rgba(255,0,255,0.25);
}

@media (hover: hover) {
  .barbie-card:hover {
    transform: scale(1.03) rotate(0.7deg);
  }
  .barbie-card.visible:hover {
    transform: scale(1.03) rotate(0.7deg);
  }
}

.card-ribbon {
  text-align: center;
  padding: 8px 0 4px;
  font-size: 1.1rem;
  letter-spacing: 4px;
  background: linear-gradient(90deg, transparent, rgba(255,105,180,0.1), transparent);
  user-select: none;
}

.card-media {
  position: relative;
  background: #000;
  line-height: 0;
}

.card-media video,
.card-media img {
  width: 100%;
  display: block;
  max-height: 65vh;
  object-fit: contain;
  background: #000;
}

.card-media img {
  object-fit: cover;
  aspect-ratio: 4/5;
}

.card-actions {
  display: flex;
  justify-content: center;
  padding: 10px 12px;
  background: linear-gradient(180deg, rgba(255,240,245,0.8), rgba(255,228,225,0.9));
}

.dl-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 16px;
  border: 2px solid var(--barbie-hot);
  border-radius: 99px;
  background: none;
  color: var(--barbie-hot);
  font-family: 'Quicksand', sans-serif;
  font-weight: 700;
  font-size: 0.9rem;
  text-decoration: none;
  transition: all 0.3s ease;
  -webkit-tap-highlight-color: transparent;
}

.dl-link:hover {
  background: var(--barbie-hot);
  color: #fff;
}

/* ================================================================
   FOOTER
   ================================================================ */
.footer {
  position: relative;
  z-index: 5;
  margin-top: 2rem;
}

.footer-wave {
  display: block;
  width: 100%;
  height: 70px;
  color: var(--barbie-deep);
  filter: drop-shadow(0 -4px 10px rgba(255,20,147,0.3));
}

.footer-bg {
  background: var(--barbie-deep);
  height: 50px;
  margin-top: -2px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ================================================================
   KEYFRAMES
   ================================================================ */
@keyframes gradient-shift {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

@keyframes shimmer {
  0% { background-position: 0% center; }
  100% { background-position: 200% center; }
}
</style>
</head>
<body>

<header>
  <h1 class="site-title">Archive</h1>
</header>

<div class="back-link-section">
  <a href="index.html" class="back-link">Back to Today</a>
</div>

<main class="gallery" id="gallery"></main>

<footer class="footer">
  <svg class="footer-wave" viewBox="0 0 1440 70" preserveAspectRatio="none" fill="currentColor">
    <path d="M0,40 C360,80 720,0 1080,40 C1260,60 1380,50 1440,40 L1440,70 L0,70 Z"/>
  </svg>
  <div class="footer-bg"></div>
</footer>

<script>
/* ================================================================
   MEDIA FILES
   ================================================================ */
const files = [
  { file: 'media/26.03.1.mp4',  type: 'video' },
  { file: 'media/26.03.2.mp4',  type: 'video' },
  { file: 'media/26.03.3.mp4',  type: 'video' },
  { file: 'media/26.03.4.jpg',  type: 'image' },
  { file: 'media/26.03.5.jpg',  type: 'image' },
  { file: 'media/26.03.6.mp4',  type: 'video' },
  { file: 'media/26.03.7.mp4',  type: 'video' },
  { file: 'media/26.03.8.mp4',  type: 'video' },
  { file: 'media/26.03.9.mp4',  type: 'video' },
  { file: 'media/26.03.10.mp4', type: 'video' },
  { file: 'media/26.03.11.mp4', type: 'video' },
  { file: 'media/26.03.12.jpg', type: 'image' },
  { file: 'media/26.03.13.mp4', type: 'video' },
  { file: 'media/26.03.14.mp4', type: 'video' },
  { file: 'media/26.03.15.mp4', type: 'video' },
  { file: 'media/26.03.16.mp4', type: 'video' },
  { file: 'media/26.03.17.jpg', type: 'image' },
  { file: 'media/26.03.18.mp4', type: 'video' },
  { file: 'media/26.03.19.jpg', type: 'image' },
  { file: 'media/26.03.20.mp4', type: 'video' },
  { file: 'media/26.03.21.mp4', type: 'video' },
  { file: 'media/26.03.22.mp4', type: 'video' },
  { file: 'media/26.03.23.mp4', type: 'video' },
  { file: 'media/26.03.24.mp4', type: 'video' }
];

const ribbons = [
  '\u2764\uFE0F \u2728 \u2764\uFE0F',
  '\u2728 \uD83D\uDC96 \u2728',
  '\uD83D\uDC96 \u2764\uFE0F \uD83D\uDC96',
  '\u2B50 \uD83D\uDC95 \u2B50',
  '\uD83C\uDF38 \u2764\uFE0F \uD83C\uDF38',
  '\u2728 \u2764\uFE0F \u2728'
];

/* ================================================================
   BUILD GALLERY
   ================================================================ */
function buildGallery() {
  const gallery = document.getElementById('gallery');

  const section = document.createElement('section');
  section.className = 'category-section';

  const title = document.createElement('h2');
  title.className = 'category-title';
  title.textContent = '26/03';
  section.appendChild(title);

  const grid = document.createElement('div');
  grid.className = 'category-grid';

  files.forEach(function(item, idx) {
    const card = document.createElement('div');
    card.className = 'barbie-card';

    // Ribbon
    var ribbon = document.createElement('div');
    ribbon.className = 'card-ribbon';
    ribbon.textContent = ribbons[idx % ribbons.length];
    card.appendChild(ribbon);

    // Media
    var mediaWrap = document.createElement('div');
    mediaWrap.className = 'card-media';

    if (item.type === 'video') {
      var video = document.createElement('video');
      video.controls = true;
      video.playsInline = true;
      video.preload = 'metadata';
      video.setAttribute('controlslist', 'nodownload');
      var source = document.createElement('source');
      source.src = encodeURI(item.file);
      source.type = 'video/mp4';
      video.appendChild(source);
      mediaWrap.appendChild(video);
    } else {
      var img = document.createElement('img');
      img.src = encodeURI(item.file);
      img.alt = '';
      img.loading = 'lazy';
      img.decoding = 'async';
      mediaWrap.appendChild(img);
    }
    card.appendChild(mediaWrap);

    // Actions (download/open link)
    var actions = document.createElement('div');
    actions.className = 'card-actions';

    var link = document.createElement('a');
    link.className = 'dl-link';
    link.href = encodeURI(item.file);
    link.target = '_blank';
    link.rel = 'noopener';
    link.textContent = item.type === 'video' ? '\u25B6 Open' : '\uD83D\uDDBC\uFE0F Open';
    actions.appendChild(link);

    card.appendChild(actions);
    grid.appendChild(card);
  });

  section.appendChild(grid);
  gallery.appendChild(section);
}

buildGallery();

/* ================================================================
   INTERSECTION OBSERVER — animate cards in on scroll
   ================================================================ */
var observer = new IntersectionObserver(function(entries) {
  entries.forEach(function(entry) {
    if (entry.isIntersecting) {
      entry.target.classList.add('visible');
      observer.unobserve(entry.target);
    }
  });
}, { threshold: 0.08 });

document.querySelectorAll('.barbie-card').forEach(function(card) {
  observer.observe(card);
});
</script>
</body>
</html>
